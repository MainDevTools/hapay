# Fly.io конфіг для read-API. Заміни app на свою назву; секрети — через `fly secrets set`.
app = "radar-znyzhok"
primary_region = "waw"          # Варшава — низька латентність до України

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"   # засинає без трафіку (дешево)
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
