name: hapay
description: "Хапай — агрегатор знижок українських крамниць."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0                    # запити до hapay.today API
  cached_network_image: ^3.3.1   # фото товарів — hotlink, кеш (§7.4: лише URL, не байти)
  fl_chart: ^0.68.0              # графік історії ціни в картці товару
  intl: ^0.19.0                  # формат грн (uk_UA)
  url_launcher: ^6.2.5           # «відкрити в крамниці»

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
