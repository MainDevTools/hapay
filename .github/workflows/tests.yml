name: tests

# CI-гейт (#28): golden-тести парсерів на кожен push/PR. Офлайн (касети/фікстури), без мережі.

on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Залежності
        run: pip install -r requirements.txt
      - name: probe — сигнальний парсер (stdlib)
        run: python tests/test_probe.py
      - name: Pethouse — екстрактор на касеті (selectolax)
        run: python tests/test_pethouse.py
      - name: PetChoice — екстрактор на касеті (miniShop2)
        run: python tests/test_petchoice.py
      - name: детекція — ядро бейджів на синтетиці (§5)
        run: python tests/test_detection.py
      - name: initData — верифікація Telegram (§8.10.1)
        run: python tests/test_initdata.py
      - name: таксономія — категоризація за URL (§2.6)
        run: python tests/test_taxonomy.py

  migration:
    # Верифікація 0001 проти живого PostgreSQL 18 (= версія прод-Neon; Timescale-фічі → 0002).
    # УВАГА: ці тести РУЙНІВНІ (reset() дропає всі таблиці) → лише TEST_DATABASE_URL.
    # DATABASE_URL тут не задаємо НІКОЛИ: саме через спільну назву змінної ми
    # знесли живу базу 2026-07-17 (T13).
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://postgres:radar@localhost:5432/radar
    services:
      db:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: radar
          POSTGRES_DB: radar
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: запобіжник — руйнівний тест НЕ бере прод-URL (T13)
        run: python tests/test_dbguard.py
      - name: 0001 міграція + DoD §6.6 (round-trip RawItem, append-only)
        run: python tests/test_migration.py
      - name: detect_pass — бейдж verified + ідемпотентність (§5/§8.4)
        run: python tests/test_detect_pass.py
      - name: collect — конвеєр fetch→persist→detect_pass на касеті (§8.1)
        run: python tests/test_collect.py
      - name: read-API — перелік/історія/watchlist (§8.10.1)
        run: python tests/test_api.py

  docker:
    # Верифікація Dockerfile: образ будується й API стартує (/api/health без БД).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build образ read-API
        run: docker build -t radar-api .
      - name: Smoke /api/health (без БД)
        run: |
          docker run -d --name api -p 8080:8080 -e RUN_MIGRATIONS=0 radar-api
          ok=0
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/api/health; then ok=1; break; fi
            sleep 2
          done
          test "$ok" = 1
          curl -s http://localhost:8080/api/health | grep -q '"ok":true'

