name: probe-ip

# Разова діагностика (ручний запуск): які укр. крамниці пускають IP GitHub Actions (Azure).
# Не cron — лише workflow_dispatch, по 1 запиту/крамниця з паузою (перевірка досяжності, не скрап).
# Читати: HTTP 200 = пускає; 403/429/503 = блок IP/WAF; 404 = невірний URL (не блок).
# «₴» у тілі = схоже на живу сторінку (не challenge-заглушка).

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: runner IP
        run: echo "Azure IP:" && curl -s --max-time 15 https://api.ipify.org || echo "?"
      - name: probe
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          probe () {
            name="$1"; url="$2"
            code=$(curl -s -o /tmp/b -w "%{http_code}" -A "$UA" \
                   -H "Accept-Language: uk,en;q=0.9" -H "Accept: text/html" \
                   --compressed --max-time 25 -L "$url" 2>/dev/null || echo ERR)
            size=$(wc -c < /tmp/b 2>/dev/null || echo 0)
            uah=$(grep -c -F "₴" /tmp/b 2>/dev/null || echo 0)
            printf "%-13s %-4s %9sB  ₴x%-4s %s\n" "$name" "$code" "$size" "$uah" "$url"
            sleep 2
          }
          echo "===== ЕЛЕКТРОНІКА ====="
          probe Rozetka   "https://rozetka.com.ua/ua/mobile-phones/c80003/"
          probe Foxtrot   "https://www.foxtrot.com.ua/uk/shop/mobilnye_telefony.html"
          probe Moyo      "https://www.moyo.ua/ua/telecommunication/smart/"
