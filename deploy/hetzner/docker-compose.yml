# «Хапай» — повний стек на одному Hetzner CX23 (Ubuntu 24.04).
#
# ЗМІНА (2026-07-18): Neon відкинуто — Postgres тут-таки, на сервері (рішення власника,
# T14-доба). Наслідок: колектор ПЕРЕЇХАВ сюди з GitHub Actions, бо база тепер приватна
# (без публічного порту) і Actions до неї не достукаються. Усе на одній машині.
#
# Postgres НЕ має `ports:` — доступний лише всередині docker-мережі, НІКОЛИ з інтернету.
# Секрети — лише з /etc/hapay/hapay.env (chmod 600, поза git). Запуск:
#   docker compose --env-file /etc/hapay/hapay.env up -d
# `--env-file` потрібен, щоб ${POSTGRES_*}/${HAPAY_DOMAIN} підставились у цей файл (env_file
# лише кладе змінні в контейнер, а для ${...}-інтерполяції compose читає саме --env-file).

name: hapay

x-app: &app                        # спільне для api / migrate / collect — усі з одного образу
  build:
    context: ../..
    dockerfile: Dockerfile
  env_file: /etc/hapay/hapay.env   # BOT_TOKEN тощо в контейнер
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

services:
  db:
    image: postgres:18             # = версія, проти якої зелений CI (і що була на Neon)
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data   # історія цін живе ТУТ — том переживає рестарти
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

  migrate:                         # одноразово: накотити міграції й вийти
    <<: *app
    restart: "no"
    depends_on:
      db: {condition: service_healthy}
    command: ["python", "-m", "db.migrate"]

  api:
    <<: *app
    restart: unless-stopped
    depends_on:
      db: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    expose: ["8080"]              # НЕ ports: назовні дивиться лише Caddy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

  collect:                         # НЕ стартує сам (profile) — запускає systemd-таймер 2x/добу
    <<: *app
    profiles: ["cli"]
    depends_on:
      db: {condition: service_healthy}
    command: ["python", "-m", "collect"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      HAPAY_DOMAIN: ${HAPAY_DOMAIN}         # Caddyfile читає {$HAPAY_DOMAIN} — інакше порожньо
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data                     # сертифікати Let's Encrypt — не губити при рестарті
      - caddy_config:/config
    depends_on: [api]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

volumes:
  db_data:                          # ⚠ найцінніше: історія цін. Бекап — hapay-backup.timer
  caddy_data:
  caddy_config:
